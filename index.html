<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#141412">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Navi">
  <meta name="description" content="Navi, Shaya's Claude-powered pocket chat.">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" href="/icons/icon-192.png">
  <title>Navi</title>
  <style>
    :root{
      --bg:#141412; --ink:#ede9e0; --muted:#9a958a; --brass:#c9a45c;
      --safe-top:env(safe-area-inset-top,0px);
      --safe-bottom:env(safe-area-inset-bottom,0px);
    }
    *{box-sizing:border-box;}
    html,body{height:100%;margin:0;background:var(--bg);color:var(--ink);
      -webkit-font-smoothing:antialiased;
      font:16px/1.5 -apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;}
    .wrap{position:fixed;inset:0;display:grid;place-items:center;
      padding:calc(var(--safe-top) + 24px) 24px calc(var(--safe-bottom) + 24px);}
    .card{width:100%;max-width:340px;text-align:center;}
    .logo{width:76px;height:76px;border-radius:20px;margin:0 auto 20px;display:block;}
    h1{font-size:27px;letter-spacing:-.02em;margin:0 0 6px;}
    p{color:var(--muted);margin:0 0 26px;font-size:15px;}
    .btn{display:block;width:100%;background:var(--brass);color:#141412;
      border:0;border-radius:14px;padding:16px 18px;font-size:17px;font-weight:700;
      text-decoration:none;-webkit-tap-highlight-color:transparent;}
    .btn:active{opacity:.85;}
    .hint{margin-top:16px;font-size:13px;color:var(--muted);line-height:1.45;}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="card">
      <img class="logo" src="/icons/icon-192.png" alt="">
      <h1>Navi</h1>
      <p>Your Claude-powered pocket chat.</p>
      <a class="btn" href="https://claude.site/public/artifacts/46857011-4ff9-4028-8bb3-cc3a92e0682c/embed" target="_blank" rel="noopener">Open Navi</a>
      <div class="hint">Opens the web chat in-app — no API key needed.</div>
    </div>
  </main>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("/sw.js").catch(function () {});
      });
    }
  </script>
</body>
</html>
